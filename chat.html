<!DOCTYPE html>
<html lang="sw"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mazungumzo — UECSA Choir Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
.chat-page{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.chat-layout{display:grid;grid-template-columns:260px 1fr;flex:1;overflow:hidden;height:calc(100vh - 62px);}
@media(max-width:768px){.chat-layout{grid-template-columns:1fr;}.chat-sidebar{display:none;}}
</style>
</head><body>
<div class="chat-page">
<div id="toast"></div>
<header class="topbar">
  <a class="tb-brand" href="dashboard.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;">
    <div class="tb-logo"><img id="tb-logo-img" src="" alt=""/></div>
    <div><div class="tb-title">UECSA <span>Choir</span></div><div class="tb-sub">Wasimamizi</div></div>
  </a>
  <nav class="tb-nav"><button class="nav-btn" data-page="dashboard" onclick="location.href='dashboard.html'">🏠 Nyumbani</button><button class="nav-btn  special" data-page="massorder" onclick="location.href='massorder.html'">📄 Mwongozo</button><button class="nav-btn" data-page="chat" onclick="location.href='chat.html'">💬 Mazungumzo</button><button class="nav-btn" data-page="scores" onclick="location.href='scores.html'">📚 Nyimbo</button><button class="nav-btn" data-page="announcements" onclick="location.href='announcements.html'">📢 Matangazo</button><button class="nav-btn" data-page="about" onclick="location.href='about.html'">ℹ️ Kuhusu</button></nav>
  <div class="tb-right">
    <button class="tb-notif-btn" onclick="toggleNotifPanel()">🔔<span class="notif-dot" id="notif-dot" style="display:none">!</span></button>
    <div class="tb-user" onclick="location.href='about.html'" style="cursor:pointer;display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:10px;transition:background .2s;" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background=''">
      <div class="tb-av" id="tb-av">E</div>
      <div><div class="tb-uname" id="tb-uname" style="font-size:13px;font-weight:600;"></div><div class="tb-urole" id="tb-urole" style="font-size:10.5px;color:var(--muted);"></div></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">⏻</button>
  </div>
</header>
<div class="notif-panel" id="notif-panel">
  <div class="np-head">🔔 Arifa<button class="np-clear" onclick="clearNotifs()">Futa zote</button></div>
  <div id="notif-list"><p class="np-empty">Hakuna arifa mpya.</p></div>
</div>
<button class="owner-fab" id="owner-fab" onclick="document.getElementById('owner-panel').classList.toggle('open');typeof renderOwnerPanel==='function'&&renderOwnerPanel()">👁</button>
<div class="owner-panel" id="owner-panel">
  <div class="op-head">👁 Ufuatiliaji<button class="op-close" onclick="document.getElementById('owner-panel').classList.remove('open')">✕</button></div>
  <div id="op-content"></div>
</div>
<script>document.addEventListener('DOMContentLoaded',function(){var u=requireAuth();if(!u)return;buildTopbar('chat');});</script>
<div class="chat-layout">
  <div class="chat-sidebar">
    <div class="cs-head">Mazungumzo</div>
    <div class="cs-list" id="cs-list">
      <div class="cs-item active" id="cs-group" onclick="showGroupChat()">
        <div class="cs-av" style="background:linear-gradient(135deg,var(--green),var(--green3));color:#fff;">K</div>
        <div class="cs-info"><div class="cs-name">Kikundi — Wasimamizi Wote</div><div class="cs-preview" id="gc-preview">Mazungumzo ya pamoja</div></div>
      </div>
      <div id="dm-list"></div>
    </div>
  </div>
  <div class="chat-main">
    <div class="chat-header" id="chat-header">
      <div class="ch-av" id="ch-av" style="background:linear-gradient(135deg,var(--green),var(--green3));">K</div>
      <div><div class="ch-name" id="ch-name">Kikundi — Wasimamizi Wote</div><div class="ch-sub" id="ch-sub">Mazungumzo ya pamoja</div></div>
    </div>
    <div class="chat-msgs" id="chat-msgs"><div class="chat-empty">Karibu kwenye mazungumzo ya Wasimamizi 🎵</div></div>
    <div class="compose">
      <textarea class="compose-inp" id="chat-inp" rows="1"
        placeholder="Andika ujumbe... (Enter = tuma, Shift+Enter = mstari mpya)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';"></textarea>
      <button class="send-btn" onclick="sendMsg()">&#x2191;</button>
    </div>
  </div>
</div>
</div>
<script src="shared.js"></script>
<script src="chat.js"></script>
</body></html>
